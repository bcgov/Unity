apiVersion: v1
kind: ServiceAccount
metadata:
  name: unity-github-runner
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unity-github-runner-role
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints", "persistentvolumeclaims", "events", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["build.openshift.io"]
  resources: ["builds", "buildconfigs", "buildconfigs/webhooks"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["image.openshift.io"]
  resources: ["imagestreams"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unity-github-runner-rolebinding
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
subjects:
- kind: ServiceAccount
  name: unity-github-runner
  namespace: d18498-tools
roleRef:
  kind: Role
  name: unity-github-runner-role
  apiGroup: rbac.authorization.k8s.io