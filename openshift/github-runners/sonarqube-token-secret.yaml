apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-token
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: sonarqube-token
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
  annotations:
    template.openshift.io/expose-token: "{.data['token']}"
type: Opaque
stringData:
  # Replace 'your_sonarqube_token_here' with actual SonarQube token
  # Generate token in SonarQube: Administration > Security > Users > Tokens
  token: "your_sonarqube_token_here"