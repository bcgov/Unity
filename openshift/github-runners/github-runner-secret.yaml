apiVersion: v1
kind: Secret
metadata:
  name: github-runner-token
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
  annotations:
    template.openshift.io/expose-token: "{.data['token']}"
type: Opaque
stringData:
  # Replace 'your_github_pat_here' with actual GitHub Personal Access Token
  # Token needs permissions: Repository access (Unity), Actions (Write), Administration (Write), Metadata (Read)
  token: "your_github_pat_here"