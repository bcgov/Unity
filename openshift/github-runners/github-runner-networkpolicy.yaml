apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: unity-github-runner-network-policy
  namespace: d18498-tools
  labels:
    app: unity-github-runner
    app.kubernetes.io/name: github-runner
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: unity
spec:
  podSelector:
    matchLabels:
      app: unity-github-runner
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: d18498-tools
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow access to GitHub API and Actions
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  # Allow access to SonarQube
  - to: []
    ports:
    - protocol: TCP
      port: 9000
    - protocol: TCP
      port: 443
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow access to internal services
  - to:
    - namespaceSelector:
        matchLabels:
          name: d18498-tools
    ports:
    - protocol: TCP
      port: 9000
    - protocol: TCP
      port: 5432