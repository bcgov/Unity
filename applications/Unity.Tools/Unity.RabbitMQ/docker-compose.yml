services:
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: unity-rabbitmq
    hostname: unity-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-admin}
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit log_levels [{connection,error},{default,info}]
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management interface port
      - "15692:15692"   # Prometheus metrics port (optional)
      - "25672:25672"   # Inter-node and CLI tool communication port
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - rabbitmq-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

networks:
  rabbitmq-network:
    driver: bridge

volumes:
  rabbitmq-data:
    driver: local