<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Enterprise Grant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #f0f0f0;
            font-family: BCSans, "Noto Sans", Verdana, Arial, sans-serif;
        }

        /* Full screen background using CSS recreation */
        .screenshot-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #003366 50%, #f0f0f0 50%);
        }

        /* Recreate the login card */
        .login-card {
            position: absolute;
            left: 9%;
            top: 35%;
            width: 32%;
            height: 35%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .login-title {
            color: #003366;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .login-subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .login-description {
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .login-button {
            background: #003366;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        /* Dashboard preview using actual image */
        .dashboard-card {
            position: absolute;
            right: 8%;
            top: 25%;
            width: 35%;
            height: 45%;
            background-image: url('https://prod-grants.apps.silver.devops.gov.bc.ca/images/dashboard-preview.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
        }

        .dashboard-header {
            display: none;
        }

        .dashboard-content {
            display: none;
        }

        /* BC Logo */
        .bc-logo {
            position: absolute;
            top: 2rem;
            left: 75%;
            transform: translateX(-50%);
            width: 450px;
            height: 135px;
            background-image: url('https://prod-grants.apps.silver.devops.gov.bc.ca/images/logo/BCID_H_rgb_pos.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 10;
        }

        /* Grants URL */
        .grants-url {
            position: absolute;
            bottom: 2rem;
            left: 75%;
            transform: translateX(-50%);
            color: #003366;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            z-index: 10;
        }

        /* Interactive overlay for the login button */
        .login-button-overlay {
            position: absolute;
            left: 12%;
            top: 63%;
            width: 20%;
            height: 5%;
            background: transparent;
            cursor: pointer;
            border: none;
            z-index: 10;
            border-radius: 4px;
        }

        .login-button-overlay:hover {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .login-button-overlay:active {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Interactive overlay for dashboard elements */
        .dashboard-overlay {
            position: absolute;
            right: 0;
            top: 20%;
            width: 50%;
            height: 60%;
            background: transparent;
            cursor: pointer;
            border: none;
            z-index: 5;
            border-radius: 8px;
        }

        .dashboard-overlay:hover {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }

        /* Invisible overlays for other interactive elements */
        .bc-logo-overlay {
            position: absolute;
            top: 6%;
            right: 6%;
            width: 20%;
            height: 12%;
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }

        .grants-url-overlay {
            position: absolute;
            bottom: 6%;
            right: 6%;
            width: 15%;
            height: 4%;
            background: transparent;
            cursor: pointer;
            z-index: 10;
        }

        /* Tooltip styles */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .login-button-overlay {
                left: 10%;
                top: 60%;
                width: 22%;
                height: 6%;
            }
            
            .dashboard-overlay {
                right: 0;
                top: 18%;
                width: 50%;
                height: 65%;
            }
        }

        @media (max-width: 768px) {
            .login-button-overlay,
            .dashboard-overlay,
            .bc-logo-overlay,
            .grants-url-overlay {
                display: none; /* Hide interactive elements on small screens */
            }
        }

        /* Ensure image always fits properly regardless of screen size */
        @media (min-aspect-ratio: 16/9) {
            .screenshot-background {
                background-size: contain;
            }
        }

        @media (max-aspect-ratio: 16/9) {
            .screenshot-background {
                background-size: contain;
            }
        }
    </style>
</head>
<body>
    <!-- Recreated background -->
    <div class="screenshot-background"></div>
    
    <!-- BC Logo -->
    <div class="bc-logo"></div>
    
    <!-- Grants URL -->
    <div class="grants-url">grants.gov.bc.ca</div>
    
    <!-- Login Card -->
    <div class="login-card">
        <h1 class="login-title">Enterprise Grant</h1>
        <p class="login-subtitle">Management System Portal</p>
        <p class="login-description">Sign in to access your information and submission status.</p>
        <button class="login-button" onclick="handleLogin()">Login</button>
    </div>
    
    <!-- Dashboard Card -->
    <div class="dashboard-card" onclick="handleDashboard()"></div>
    
    <!-- Interactive overlays for better coverage -->
    <button class="login-button-overlay tooltip" data-tooltip="Click to simulate login" onclick="handleLogin()"></button>
    
    <div class="dashboard-overlay tooltip" data-tooltip="Dashboard preview" onclick="handleDashboard()"></div>
    
    <div class="bc-logo-overlay tooltip" data-tooltip="British Columbia Government" onclick="handleBCLogo()"></div>
    
    <div class="grants-url-overlay tooltip" data-tooltip="Visit grants.gov.bc.ca" onclick="handleGrantsUrl()"></div>

    <script>
        function handleLogin() {
            alert('Login functionality - This is a mockup page for testing routes. In the real application, this would redirect to the authentication system.');
        }

        function handleDashboard() {
            alert('Dashboard Landing Page Preview..');
        }

        function handleBCLogo() {
            alert('British Columbia Government - This would normally link to the main BC Government website.');
        }

        function handleGrantsUrl() {
            alert('grants.gov.bc.ca - This represents the actual grants portal.');
        }

        // Add keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                if (document.activeElement.classList.contains('login-button-overlay')) {
                    handleLogin();
                }
            }
        });

        // Make overlays focusable for accessibility
        document.addEventListener('DOMContentLoaded', function() {
            const overlays = document.querySelectorAll('.login-button-overlay, .dashboard-overlay, .bc-logo-overlay, .grants-url-overlay');
            overlays.forEach(overlay => {
                overlay.setAttribute('tabindex', '0');
            });
        });
    </script>
    
    <!-- Matomo -->
    <script>
    var _paq = window._paq = window._paq || [];
    /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);
    (function() {
        var u="//dev-analytics-matomo.apps.silver.devops.gov.bc.ca/";
        _paq.push(['setTrackerUrl', u+'matomo.php']);
        _paq.push(['setSiteId', '1']);
        var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
        g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
    })();
    </script>
    <!-- End Matomo Code -->
</body>
</html>
