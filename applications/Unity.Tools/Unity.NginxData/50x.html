<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable</title>
    <style>
        @font-face {
            font-family: 'BCSans';
            src: url('/fonts/BCSans/BCSans-Regular.woff2') format('woff2'), url('/fonts/BCSans/BCSans-Regular.woff') format('woff');
            font-weight: 300 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'BCSans';
            src: url('/fonts/BCSans/BCSans-Bold.woff2') format('woff2'), url('/fonts/BCSans/BCSans-Bold.woff') format('woff');
            font-weight: 700 900;
            font-style: normal;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'BCSans', 'BC Sans', 'Noto Sans', Verdana, Arial, sans-serif;
            background-color: #ffffff;
            color: #494949;
            font-size: 16px;
            line-height: 1.25;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .accent {
            width: 48px;
            height: 4px;
            background-color: #2A9546;
            margin: 0 auto 1.5rem;
            border-radius: 2px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2A9546;
            margin: 0 0 1rem;
        }
        p {
            font-size: 1rem;
            color: #6b6b6b;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent"></div>
        <h1>Service Unavailable</h1>
        <p>Internal errors, bad gateway, or timeout on this service.</p>
    </div>
</body>
</html>
