name: SonarCloud Analysis

on:
  push:
    branches:
      - dev
      - test
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  UGM_BUILD_VERSION: ${{vars.UGM_BUILD_VERSION}}

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Set version for SonarCloud
        run: |
          if [ -z "${{ env.UGM_BUILD_VERSION }}" ]; then
            echo "BUILD_VERSION=1.0.0-dev" >> $GITHUB_ENV
          else
            echo "BUILD_VERSION=${{ env.UGM_BUILD_VERSION }}" >> $GITHUB_ENV
          fi

      - name: Restore dependencies
        working-directory: ./applications/Unity.GrantManager
        run: dotnet restore Unity.GrantManager.sln

      - name: Build and analyze
        working-directory: ./applications/Unity.GrantManager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"bcgov_Unity" /o:"bcgov-sonarcloud" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /v:"${{ env.BUILD_VERSION }}"
          dotnet build Unity.GrantManager.sln --no-restore
          dotnet test Unity.GrantManager.sln --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults/
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"