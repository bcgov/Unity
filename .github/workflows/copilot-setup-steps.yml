name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore applications/Unity.GrantManager/Unity.GrantManager.sln

      - name: Build solution
        run: dotnet build applications/Unity.GrantManager/Unity.GrantManager.sln --no-restore

      - name: Run tests
        run: dotnet test applications/Unity.GrantManager/Unity.GrantManager.sln --no-build
